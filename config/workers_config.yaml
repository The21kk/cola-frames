# Worker Configuration - Scalable Multi-Model Ensemble Setup
# 
# Each worker is an ENSEMBLE of 2 different models with internal consensus voting.
# Add or remove workers by editing this file - NO CODE CHANGES NEEDED.
#
# Fields:
#   - name: Unique identifier for this worker instance
#   - models: List of 2 model names [model1, model2]
#   - model_types: List of 2 model types matching the models [type1, type2]
#   - device: CUDA device string (cuda:0, cuda:1, cpu)
#   - batch_size: Number of frames to process in parallel
#   - confidence_threshold: Detection confidence threshold (0.0-1.0)
#   - parameters: Model-specific parameters (optional)

workers:
  # Worker 1: YOLOv10 Small + Vision Transformer (Detectron2) ensemble
  - name: "worker_1"
    models: ["yolov10s", "vit_base_detectron2"]
    model_types: ["yolov10", "detectron2"]
    device: "cuda:0"
    batch_size: 4
    confidence_threshold: 0.5
    parameters: {}

  # Worker 2: RT-DETR + Faster R-CNN (ensemble: real-time DETR vs traditional CNN)
  - name: "worker_2"
    models: ["rtdetr_resnet50", "fasterrcnn_resnet50_fpn"]
    model_types: ["rt_detr", "faster_rcnn"]
    device: "cuda:0"
    batch_size: 2
    confidence_threshold: 0.5
    parameters: {}

# ============================================================================
# EXAMPLES: Easily add more workers without code changes
# ============================================================================

# Example: Add YOLOv10 nano (lightweight) on GPU 1
# - name: "yolov10_nano_2"
