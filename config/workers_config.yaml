#   confidence_threshold: 0.5
#   parameters: {}

# ============================================================================
# NOTES:
# - All workers process all camera streams in ensemble (consensus voting)
# - Default confidence_threshold: 0.5 (50% confidence minimum)
# - Batch size affects GPU memory usage and throughput
# - Device format: "cuda:0", "cuda:1", "cpu"
# ============================================================================
